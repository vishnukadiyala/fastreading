<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>fastreading — RSVP speed reader for research papers</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<header>
  <div class="header-row">
    <div>
      <h1>fastreading</h1>
      <p class="tagline">RSVP speed reader for research papers. Drop a PDF, focus on the red anchor.</p>
    </div>
    <button id="open-settings" class="btn ghost settings-btn" type="button">Settings</button>
  </div>
</header>

<main>
  <section id="library" class="library hidden">
    <h2 class="library-title">Recent papers</h2>
    <ul id="library-list" class="library-list"></ul>
  </section>

  <section id="drop-zone" class="drop-zone">
    <input type="file" id="file-input" accept="application/pdf,text/plain" hidden />
    <label for="file-input" class="drop-label">
      <strong>Drop a PDF or .txt here</strong>
      <span>or click to choose a file</span>
    </label>
    <p id="status" class="status"></p>
  </section>

  <section id="outline" class="outline hidden">
    <div class="outline-header">
      <div class="outline-titles">
        <h2 id="outline-title" class="outline-title"></h2>
        <span id="outline-meta" class="outline-meta"></span>
      </div>
      <div class="outline-actions">
        <button id="outline-read-all" class="btn primary" type="button">Read full paper</button>
        <button id="outline-back" class="btn ghost" type="button">&larr; Library</button>
      </div>
    </div>

    <div id="ai-bar" class="ai-bar">
      <span id="ai-status" class="ai-status"></span>
      <button id="summarize-all" class="btn" type="button">Summarize all sections</button>
    </div>

    <ul id="outline-sections" class="outline-sections"></ul>
  </section>

  <section id="reader" class="reader hidden">
    <div class="reader-display">
      <div class="anchor-rail"></div>
      <div id="word-display" class="word-display" aria-live="polite"></div>
      <div class="anchor-rail"></div>
    </div>

    <div class="progress">
      <div id="progress-bar" class="progress-bar"></div>
    </div>

    <div id="refs-bar" class="refs-bar hidden">
      <label class="refs-toggle">
        <input type="checkbox" id="include-refs" />
        <span>Include references</span>
      </label>
      <span id="refs-info" class="refs-info"></span>
    </div>

    <div class="controls">
      <button id="play-pause" class="btn primary">Play</button>
      <button id="restart" class="btn">Restart</button>
      <button id="back" class="btn">&laquo; 10s</button>
      <button id="fwd" class="btn">10s &raquo;</button>

      <label class="control">
        <span>WPM <output id="wpm-val">350</output></span>
        <input type="range" id="wpm" min="100" max="900" step="25" value="350" />
      </label>

      <label class="control">
        <span>Chunk <output id="chunk-val">1</output></span>
        <input type="range" id="chunk" min="1" max="5" step="1" value="1" />
      </label>

      <label class="control mode">
        <span>Mode</span>
        <select id="mode">
          <option value="rsvp">RSVP (single word)</option>
          <option value="chunked">Chunked phrases</option>
        </select>
      </label>

      <button id="back-to-outline" class="btn">&larr; Outline</button>
      <button id="reset" class="btn ghost">Load another</button>
    </div>

    <details class="context">
      <summary>Context (current sentence)</summary>
      <p id="context-text"></p>
    </details>
  </section>
</main>

<dialog id="settings-dialog" class="settings-dialog">
  <form method="dialog" class="settings-form">
    <h3>Settings</h3>
    <label class="settings-field">
      <span>Anthropic API key</span>
      <input type="password" id="api-key-input" placeholder="sk-ant-..." autocomplete="off" spellcheck="false" />
      <small>
        Stored only in your browser (localStorage) and sent directly to the Anthropic API
        for section summaries (Haiku 4.5). Get a key at
        <a href="https://console.anthropic.com/" target="_blank" rel="noopener">console.anthropic.com</a>.
      </small>
    </label>
    <div class="settings-actions">
      <button type="button" id="settings-clear" class="btn ghost">Clear key</button>
      <button type="button" id="settings-cancel" class="btn">Cancel</button>
      <button type="button" id="settings-save" class="btn primary">Save</button>
    </div>
  </form>
</dialog>

<footer>
  <small>
    Text stays in your browser — PDFs are parsed client-side.
    Built with <a href="https://mozilla.github.io/pdf.js/">pdf.js</a>.
  </small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@4.0.379/build/pdf.min.mjs" type="module"></script>
<script src="app.js" type="module"></script>
</body>
</html>
